<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anirecom website</title>
  <link rel="stylesheet" href="loginform.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <video autoplay loop muted playsinline class="back-video">
    <source src="luffy-blue-horizon.1920x1080.mp4" type="video/mp4">
  </video>
  <div class="wrapper">
    <form action="Anirecom website/index.html">
      <h1>Login</h1>

      <div class="input-box">
        <input type="email" placeholder="Email" required>
        <i class='bx bxs-user'></i>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class='bx bxs-lock-alt' ></i>
      </div>

      <div class="remember-forgot">
        <label><input type="checkbox">Remember Me</label>
        <a href="https://support.google.com/accounts/answer/41078?hl=en&co=GENIE.Platform%3DDesktop">Forgot Password</a>
      </div>

      <button type="submit" class="btn">Login</button>
      <div class="register-link">
        <p>Dont have an account? <a href="https://support.google.com/accounts/answer/27441?hl=en">Register</a></p>
      </div>

    </form>
  </div>
</body>
</html>
